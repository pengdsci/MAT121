<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi‑square · flash cards</title>
    <!-- MathJax for clean formulas -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CORE COLOR: purple #6E3061 with accessibility contrast */
        body {
            background-color: #512d6d;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.5;
            padding: 2rem 1.5rem;
            transition: background-color 0.25s ease, color 0.2s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            transition: background 0.2s;
        }

        /* header */
        .header {
            background: #6E3061;
            padding: 1.0rem 1.0rem;
            color: white;
            border-bottom: 4px solid #ffd966;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }
        .header h2 {
            font-size: 2.0rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }
        .header .subtitle {
            font-size: 1.35rem;
            opacity: 0.92;
            font-weight: 500;
            border-left: 3px solid #ffd966;
            padding-left: 1rem;
            margin-top: 0.25rem;
        }

        /* toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 1rem;
            padding: 0.9rem 2rem;
            background: #f9f4f7;
            border-bottom: 1px solid #e2d0dc;
            align-items: center;
        }
        .btn {
            background: white;
            border: 1px solid #c2a8bd;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #2d2a2c;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn:hover {
            background: #e9dce5;
            border-color: #6E3061;
            transform: scale(0.97);
        }
        .btn-primary {
            background: #6E3061;
            border-color: #4f2444;
            color: white;
        }
        .btn-primary:hover {
            background: #4f2444;
        }

        /* cards grid: 2 per row */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.8rem;
            padding: 2rem 2rem;
        }
        @media (max-width: 760px) {
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            body { padding: 1rem; }
        }

        /* card */
        .card {
            background: #fefcff;
            border-radius: 24px;
            box-shadow: 0 8px 20px #6E3061;
            transition: all 0.2s;
            border: 1px solid #ecdde6;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card-header {
            background: #6E3061;
            padding: 1rem 1.4rem;
            border-bottom: 2px solid #dbbdce;
            font-weight: 700;
            font-size: 1.8rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .card-header span {
            background: #6E306110;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: normal;
            font-family: monospace;
        }
        .card-body {
            padding: 1.3rem 1.4rem 1.6rem;
            flex: 1;
        }
        .formula-block {
            background: #f5f0f3;
            padding: 0.9rem;
            border-radius: 18px;
            margin: 0.8rem 0;
            font-size: 1rem;
            overflow-x: auto;
            text-align: center;
        }
        .example-box {
            background: #faf4f8;
            border-left: 4px solid #6E3061;
            padding: 0.7rem 1rem;
            margin: 0.6rem 0;
            border-radius: 0 14px 14px 0;
            font-size: 0.95rem;
        }

        .check-row {
            display: flex;
            align-items: center;
            margin-top: 1rem;
            gap: 0.7rem;
            border-top: 1px dashed #e2d0dc;
            padding-top: 0.8rem;
            font-size: 0.85rem;
        }
        .check-row input {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #6E3061;
        }
        .badge {
            background: #e2d0dc;
            border-radius: 30px;
            padding: 0.2rem 0.7rem;
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* footer */
        footer {
            background: #f3eaf0;
            padding: 1.2rem 2rem;
            font-size: 0.8rem;
            color: #3f2d38;
            border-top: 1px solid #e1cfda;
            /*display: flex;  */
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .site-meter {
            font-family: monospace;
        }

        /* DARK MODE */
        body.dark {
            background-color: #2c1a27;
        }
        body.dark .container {
            background: #1f1a1d;
        }
        body.dark .card {
            background: #2b2428;
            border-color: #4d3a44;
        }
        body.dark .card-header {
            background: #6E3061;
            color: white;
            border-bottom-color: #6E3061;
        }
        body.dark .card-body {
            color: #efeaed;
        }
        body.dark .formula-block {
            background: #3a2e35;
            color: #f3e6ef;
        }
        body.dark .example-box {
            background: #352b30;
            border-left-color: #9b6f8a;
        }
        body.dark .toolbar {
            background: #2a2126;
            border-bottom-color: #4b3942;
        }
        body.dark .btn {
            background: #3f2f37;
            border-color: #6E3061;
            color: #f0e3ea;
        }
        body.dark .btn-primary {
            background: #6E3061;
            color: white;
        }
        body.dark footer {
            background: #2c2228;
            color: #cfc1ca;
            border-top-color: #4a3842;
        }
        body.dark .badge {
            background: #4a3842;
        }

        /* PRINT */
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .container { background: white; box-shadow: none; border-radius: 0; }
            .toolbar { display: none; }
            .cards-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 1rem;
                padding: 1rem;
            }
            .card {
                break-inside: avoid;
                page-break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ccc;
            }
            .check-row input { opacity: 1; border: 1px solid black; }
            footer { background: #f5f5f5; color: black; }
            .btn, .toolbar .btn { display: none; }
            body.dark .card-header, body.dark .card-body { color: black; background: #fff; }
            .formula-block { background: #f7f7f7; }
            @page { size: A3; }
            @page letter { size: letter; }
        }
        @media print and (max-width: 760px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
    </style>
</head>
<body>

<div class="container" id="appContainer">

    <!-- HEADER -->
    <header class="header">
        <h2>MAT 121 Statistics I</h2>
        <h3>📊 Chi‑square tests</h3>
    </header>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <button class="btn" id="darkToggle">🌙 Dark mode</button>
    </div>

    <!-- CARDS GRID -->
    <div class="cards-grid" id="cardsGrid"></div>

    <!-- FOOTER -->
    <footer>
     <center> 
       <div class="copyright">
       <p>© 2019-<span id="currentYear"></span>  C. Peng @ West Chester University, USA. All rights reserved.</p>

         </div>
       </center> 
  </footer>
</div>

<script>
  
         // Set current year in copyright
        document.getElementById('currentYear').textContent = new Date().getFullYear(); 

    (function() {
        // ----- card data -------------------------------------------------
        const cards = [
            {
                title: "Goodness‑of‑fit",
                badge: "GOF",
                concept: "Tests if a single categorical variable follows a specified distribution. $H_0: p_i = \\text{specified}$ for all $k$ categories.",
                formula: "$$\\chi^2 = \\sum \\frac{(O_i - E_i)^2}{E_i} \\sim \\chi^2_{(k-1)}$$",
                example: "Die roll (60 times): observed (12,7,14,15,4,8), expected $E_i=10$. $\\chi^2=9.4$, df=5, fail to reject fair die."
            },
            {
                title: "Independence",
                badge: "I",
                concept: "Tests if two categorical variables are independent. $H_0$: joint probabilities = product of marginals.",
                formula: "$$\\chi^2 = \\sum_{i,j} \\frac{(O_{ij} - E_{ij})^2}{E_{ij}} \\sim \\chi^2_{(r-1)(c-1)}$$",
                example: "Attendance vs grade: $\\chi^2=17.75$, df=1, reject $H_0$ → attendance & performance are dependent."
            },
            {
                title: "Expected frequencies",
                badge: "E",
                concept: "Under $H_0$, $E_i = N \\cdot p_i$ (GOF) or $E_{ij} = \\frac{(row\\,total)(col\\,total)}{N}$ (independence).",
                formula: "$$E_{ij} = \\frac{R_i \\cdot C_j}{N}$$",
                example: "For 2×2 table: row totals 27,23; col totals 33,17; $N=50$ → $E_{11}=27*33/50=17.82$."
            },
            {
                title: "Degrees of freedom",
                badge: "df",
                concept: "GOF: df = $k-1$ (k categories). Independence: df = $(r-1)(c-1)$.",
                formula: "$$\\text{df}_{GOF} = k-1 \\quad ; \\quad \\text{df}_{Ind} = (r-1)(c-1)$$",
                example: "Die (6 categories) → df=5. 3×4 table → df=(3-1)(4-1)=6."
            },
            {
                title: "Chi‑square distribution",
                badge: "χ²",
                concept: "Right‑skewed, non‑negative. Critical values from table; test is always right‑tailed.",
                formula: "$$\\chi^2_{\\alpha, df} \\; \\text{(critical value)}$$",
                example: "$\\chi^2_{0.05, 5} = 11.071$. If test stat > 11.071 → reject $H_0$."
            },
            {
                title: "Motivational example (proportion)",
                badge: "ex",
                concept: "Test $p=0.3$ vs $p\\ne0.3$ using GOF. Observed 33 STEM, 67 non‑STEM; expected 30/70.",
                formula: "$$\\chi^2 = \\frac{(33-30)^2}{30} + \\frac{(67-70)^2}{70} = 1$$",
                example: "With df=1, $\\chi^2=1$ not significant → fail to reject $p=0.3$."
            },
            {
                title: "Grade distribution example",
                badge: "ex",
                concept: "Teacher claims: A=20%, B=35%, C=25%, D=10%, F=10%. Sample (n=100): 29,42,20,5,4.",
                formula: "$$\\chi^2 = \\frac{(29-20)^2}{20}+\\dots+\\frac{(4-10)^2}{10} = 12.56$$",
                example: "df=4, $\\chi^2_{0.05,4}=9.488$ → reject $H_0$; sample does not support claimed distribution."
            },
            {
                title: "Independence example (majors/study)",
                badge: "ex",
                concept: "College majors vs study hours. Observed 1000 students, test dependence.",
                formula: "$$\\chi^2 = \\sum \\frac{(O-E)^2}{E} = 30.56$$ (from lecture)",
                example: "df=(3-1)(4-1)=6, $\\chi^2_{0.05,6}=12.592$ → reject $H_0$: study time depends on major."
            }
        ];

        // ----- render cards ----------------------------------------------
        const grid = document.getElementById('cardsGrid');

        cards.forEach((card, idx) => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';

            // header
            const header = document.createElement('div');
            header.className = 'card-header';
            header.innerHTML = `${card.title} <span>${card.badge}</span>`;

            // body
            const body = document.createElement('div');
            body.className = 'card-body';

            // concept (with MathJax raw)
            const conceptP = document.createElement('p');
            conceptP.innerHTML = card.concept;
            body.appendChild(conceptP);

            // formula block
            const formulaDiv = document.createElement('div');
            formulaDiv.className = 'formula-block';
            formulaDiv.innerHTML = card.formula;
            body.appendChild(formulaDiv);

            // example
            const exampleDiv = document.createElement('div');
            exampleDiv.className = 'example-box';
            exampleDiv.innerHTML = `<strong>📘 example:</strong> ${card.example}`;
            body.appendChild(exampleDiv);

            // checkbox row
            const checkRow = document.createElement('div');
            checkRow.className = 'check-row';
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `cardCheck_${idx}`;
            const label = document.createElement('label');
            label.htmlFor = `cardCheck_${idx}`;
            label.textContent = '✔️ I understand this concept';
            checkRow.appendChild(checkbox);
            checkRow.appendChild(label);
            body.appendChild(checkRow);

            cardDiv.appendChild(header);
            cardDiv.appendChild(body);
            grid.appendChild(cardDiv);
        });

        // ----- dark/light toggle -----------------------------------------
        const toggleBtn = document.getElementById('darkToggle');
        toggleBtn.addEventListener('click', function() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            this.textContent = isDark ? '☀️ Light mode' : '🌙 Dark mode';
        });

        // (optional) ensure MathJax re-renders after dynamic insert
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch(() => {});
        }
    })();
</script>

<!-- ensure MathJax processes any late content -->
<script>

        if (window.MathJax && MathJax.typesetPromise) {
            setTimeout(() => {
                MathJax.typesetPromise().catch(() => {});
            }, 300);
        }
    })();
</script>

</body>
</html>
